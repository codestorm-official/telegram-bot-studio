<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Telegram Bot Studio</title>
  <link rel="icon" type="image/svg+xml" href="/static/telegram-bot-studio.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="card">
      <div class="login-brand">
        <img src="/static/telegram-bot-studio.svg" alt="Telegram Bot Studio">
        <div><h2>Telegram Bot Studio</h2><p class="muted">Easily manage your bot</p></div>
      </div>
      {% if error %}<div class="errors">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
        <div style="margin-top:18px">
          <button class="btn btn-primary" type="submit" style="width:100%">Sign in</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
