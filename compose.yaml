name: telegram-bot-studio

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_bot_studio}
      POSTGRES_USER: ${POSTGRES_USER:-telegram_bot_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-telegram_bot_studio}:${POSTGRES_PASSWORD:-change-me-locally}@postgres:5432/${POSTGRES_DB:-telegram_bot_studio}
      PANEL_USERNAME: ${PANEL_USERNAME:-admin}
      PANEL_PASSWORD: ${PANEL_PASSWORD:?Set PANEL_PASSWORD in .env}
      PANEL_SECRET_KEY: ${PANEL_SECRET_KEY:-}
      PANEL_SECURE_COOKIE: ${PANEL_SECURE_COOKIE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8080
    ports:
      - "${PORT:-8080}:8080"

volumes:
  postgres-data:
